name: Publicar Posts Agendados

on:
  schedule:
    - cron: '*/5 * * * *'   # verifica a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente

permissions:
  issues: write
  contents: read

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: pip install requests

      - name: Verificar e publicar
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          IG_TOKEN:        ${{ secrets.IG_TOKEN }}
          IG_ID:           ${{ secrets.IG_ID }}
          THREADS_TOKEN:   ${{ secrets.THREADS_TOKEN }}
          THREADS_ID:      ${{ secrets.THREADS_ID }}
          FB_TOKEN:        ${{ secrets.FB_TOKEN }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          LINKEDIN_TOKEN:  ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_URN:    ${{ secrets.LINKEDIN_URN }}
          TIKTOK_TOKEN:    ${{ secrets.TIKTOK_TOKEN }}
          YT_TOKEN:        ${{ secrets.YT_TOKEN }}
          SUBSTACK_TOKEN:  ${{ secrets.SUBSTACK_TOKEN }}
          SUBSTACK_DOMAIN: ${{ secrets.SUBSTACK_DOMAIN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/publicar.py
